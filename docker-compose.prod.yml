# Production overrides — images come from GHCR, not local build
services:
 
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
 
  api:
    # Image built by GitHub Actions and pushed to GHCR
    image: ghcr.io/\${GITHUB_USERNAME}/devops-capstone-api:\${IMAGE_TAG:-latest}
    environment:
      DB_HOST:     postgres
      DB_NAME:     appdb
      DB_USER:     appuser
      DB_PASSWORD: \${DB_PASSWORD}
      NODE_ENV:    production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
 
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       appdb
      POSTGRES_USER:     appuser
      POSTGRES_PASSWORD: \${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD","pg_isready","-U","appuser"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
 
volumes:
  pgdata:

