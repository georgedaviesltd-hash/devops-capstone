name: Build & Deploy to EC2
 
on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger
 
env:
  REGISTRY:      ghcr.io
  IMAGE_NAME:    ${{ github.repository_owner }}/devops-capstone-api
 
jobs:
  # ── Job 1: Build and push the API image ────────────────
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
 
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
 
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=git-
            type=raw,value=latest
 
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
 
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
 
  # ── Job 2: Deploy to EC2 ────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          source:      >-
            docker-compose.prod.yml,
            nginx/nginx.conf,
            nginx/frontend/index.html
          target:      /home/ubuntu/devops-capstone
 
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/devops-capstone
 
            # Write the .env file from GitHub Secrets
            cat > .env <<ENVEOF
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            GITHUB_USERNAME=${{ github.repository_owner }}
            IMAGE_TAG=${{ needs.build-and-push.outputs.image-tag }}
            ENVEOF
 
            # Login to GHCR on the EC2 instance
            echo '${{ secrets.GHCR_TOKEN }}' | \
              docker login ghcr.io \
              -u '${{ github.actor }}' \
              --password-stdin
 
            # Pull the new image
            docker pull \
              ghcr.io/${{ github.repository_owner }}/devops-capstone-api:${{ needs.build-and-push.outputs.image-tag }}
 
            # Zero-downtime rolling deploy:
            # Start new containers, then remove old ones
            docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --wait
 
            # Remove old/dangling images to free disk space
            docker image prune -f
 
            echo 'Deployment complete!'
            docker compose -f docker-compose.prod.yml ps

